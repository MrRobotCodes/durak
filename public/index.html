<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Data Collector</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    form { margin-bottom: 1em; }
    label { display: block; margin-top: .5em; }
    table, th, td { border: 1px solid black; border-collapse: collapse; padding: .5em; }
  </style>
</head>
<body>
  <h1>Research Data Collector</h1>
  <form id="dataForm">
    <label>
      Researcher:
      <input type="text" id="researcher" required>
    </label>
    <label>
      Data:
      <textarea id="data" required></textarea>
    </label>
    <button type="submit">Submit</button>
  </form>
  <h2>Collected Data</h2>
  <table id="dataTable">
    <thead>
      <tr><th>ID</th><th>Researcher</th><th>Data</th><th>Timestamp</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <script>
    async function loadData() {
      const res = await fetch('/api/data');
      const rows = await res.json();
      const tbody = document.querySelector('#dataTable tbody');
      tbody.innerHTML = '';
      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.id}</td><td>${r.researcher}</td><td>${r.data}</td><td>${r.timestamp}</td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const researcher = document.getElementById('researcher').value;
      const data = document.getElementById('data').value;
      await fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ researcher, data })
      });
      document.getElementById('researcher').value = '';
      document.getElementById('data').value = '';
      loadData();
    });

    loadData();
  </script>
</body>
</html>
