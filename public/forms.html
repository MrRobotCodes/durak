<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Builder</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    textarea { width: 100%; height: 10em; }
    label { display: block; margin-top: .5em; }
  </style>
</head>
<body>
  <h1>Form Builder</h1>
  <form id="formBuilder">
    <label>
      Form Name:
      <input type="text" id="formName" required>
    </label>
    <label>
      Fields JSON:
      <textarea id="fields" required>[{"name":"field1","type":"text"}]</textarea>
    </label>
    <button type="submit">Create Form</button>
  </form>
  <h2>Existing Forms</h2>
  <ul id="formsList"></ul>
    <script>
      const token = localStorage.getItem('token');
      if (!token) { window.location = '/login.html'; }
      function authFetch(url, options={}) {
        options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + token });
        return fetch(url, options);
      }

      async function loadForms() {
        const res = await authFetch('/api/forms');
        const forms = await res.json();
      const list = document.getElementById('formsList');
      list.innerHTML = '';
      forms.forEach(f => {
        const li = document.createElement('li');
        li.textContent = `${f.id}: ${f.name}`;
        list.appendChild(li);
      });
    }

    document.getElementById('formBuilder').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('formName').value;
      let fields;
      try {
        fields = JSON.parse(document.getElementById('fields').value);
      } catch(err) {
        alert('Invalid JSON for fields');
        return;
      }
        await authFetch('/api/forms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, fields })
        });
      document.getElementById('formName').value = '';
      loadForms();
    });

    loadForms();
  </script>
</body>
</html>
