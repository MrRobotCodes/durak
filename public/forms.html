<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Builder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">Research App</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/projects.html">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="/login.html" id="logout">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-3">Form Builder</h1>
    <form id="formBuilder" class="mb-4">
      <div class="mb-3">
        <label class="form-label">Form Name
          <input type="text" class="form-control" id="formName" required>
        </label>
      </div>
      <div class="mb-3">
        <label class="form-label">Project
          <select class="form-select" id="projectSelect"></select>
        </label>
      </div>
      <div class="mb-3">
        <label class="form-label">Fields JSON
          <textarea id="fields" class="form-control" required>[{"name":"field1","type":"text"}]</textarea>
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Create Form</button>
    </form>
    <h2>Existing Forms</h2>
    <ul id="formsList" class="list-group"></ul>
  </div>
    <script>
      const token = localStorage.getItem('token');
      if (!token) { window.location = '/login.html'; }
      function authFetch(url, options={}) {
        options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + token });
        return fetch(url, options);
      }

      async function loadProjects() {
        const res = await authFetch('/api/projects');
        const projects = await res.json();
        const select = document.getElementById('projectSelect');
        select.innerHTML = '';
        projects.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          select.appendChild(opt);
        });
        if (projects.length) {
          select.value = projects[0].id;
          loadForms();
        }
      }

      async function loadForms() {
        const projectId = document.getElementById('projectSelect').value;
        if (!projectId) return;
        const res = await authFetch(`/api/projects/${projectId}/forms`);
        const forms = await res.json();
        const list = document.getElementById('formsList');
        list.innerHTML = '';
        forms.forEach(f => {
          const li = document.createElement('li');
          li.textContent = `${f.id}: ${f.name}`;
          list.appendChild(li);
        });
      }

    document.getElementById('formBuilder').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('formName').value;
      let fields;
      try {
        fields = JSON.parse(document.getElementById('fields').value);
      } catch(err) {
        alert('Invalid JSON for fields');
        return;
      }
        const projectId = document.getElementById('projectSelect').value;
        await authFetch(`/api/projects/${projectId}/forms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, fields })
        });
      document.getElementById('formName').value = '';
      loadForms();
    });
    document.getElementById('projectSelect').addEventListener('change', loadForms);

    loadProjects();
  </script>
</body>
</html>
