<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">Research App</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/login.html" id="logout">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-3">Projects</h1>
    <form id="projectForm" class="mb-4">
      <div class="mb-3">
        <label class="form-label">Project Name
          <input type="text" class="form-control" id="projectName" required>
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Create Project</button>
    </form>
    <h2>Existing Projects</h2>
    <ul id="projectList" class="list-group"></ul>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if(!token) { window.location = '/login.html'; }
    function authFetch(url, options={}) {
      options.headers = Object.assign({}, options.headers, { 'Authorization':'Bearer '+token });
      return fetch(url, options);
    }

    async function loadProjects() {
      const res = await authFetch('/api/projects');
      const projects = await res.json();
      const list = document.getElementById('projectList');
      list.innerHTML = '';
      projects.forEach(p => {
        const li = document.createElement('li');
        li.textContent = `${p.id}: ${p.name}`;
        list.appendChild(li);
      });
    }

    document.getElementById('projectForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('projectName').value;
      await authFetch('/api/projects', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name })
      });
      document.getElementById('projectName').value='';
      loadProjects();
    });

    loadProjects();
  </script>
</body>
</html>
